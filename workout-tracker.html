<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="LIFT">
<meta name="theme-color" content="#0a0a0a">
<title>LIFT</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#e8ff47;--text:#f0f0f0;--muted:#666;--safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
#app{display:flex;flex-direction:column;height:100%}
#content{flex:1;overflow-y:auto;padding-bottom:calc(70px + var(--safe-bottom))}
#content::-webkit-scrollbar{display:none}
nav{position:fixed;bottom:0;left:0;right:0;height:calc(60px + var(--safe-bottom));padding-bottom:var(--safe-bottom);background:rgba(10,10,10,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.nav-btn.active{color:var(--accent)}
.nav-btn svg{width:22px;height:22px}
.page-header{padding:calc(var(--safe-top) + 20px) 20px 16px;border-bottom:1px solid var(--border)}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:.05em;line-height:1}
.page-subtitle{color:var(--muted);font-size:12px;font-family:'DM Mono',monospace;margin-top:4px;letter-spacing:.05em}
.page{display:none}.page.active{display:block}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:12px 16px;overflow:hidden}
.card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-title{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.day-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
.day-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.day-card:active{transform:scale(.97)}
.day-card.has-data::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
.day-card-label{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.05em;line-height:1;word-break:break-word}
.day-card-sub{font-size:11px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace}
.day-card-count{font-size:10px;color:var(--accent);margin-top:8px;font-family:'DM Mono',monospace}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.08em;text-transform:uppercase;transition:all .15s}
.btn:active{transform:scale(.96)}
.btn-primary{background:var(--accent);color:#0a0a0a;font-weight:500}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sm{padding:7px 12px;font-size:10px}
.btn-icon{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:36px;height:36px;padding:0;border-radius:8px}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;flex-direction:column;justify-content:flex-end;opacity:0;pointer-events:none;transition:opacity .25s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border-radius:20px 20px 0 0;border-top:1px solid var(--border);padding:20px;padding-bottom:calc(20px + var(--safe-bottom));max-height:90vh;overflow-y:auto;transform:translateY(30px);transition:transform .25s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px}
.modal-title{font-family:'Bebas Neue',sans-serif;font-size:28px;margin-bottom:16px}
.input-group{margin-bottom:14px}
.input-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;display:block}
.input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s}
.input:focus{border-color:var(--accent)}
.set-header{display:grid;grid-template-columns:28px 1fr 1fr 1fr 32px;gap:8px;padding:8px 16px 6px;border-bottom:1px solid var(--border)}
.set-header span{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 32px;gap:8px;align-items:center;padding:8px 16px;border-bottom:1px solid var(--border)}
.set-row:last-child{border-bottom:none}
.set-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.set-input{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 6px;color:var(--text);font-family:'DM Mono',monospace;font-size:14px;text-align:center;outline:none;width:100%}
.set-input:focus{border-color:var(--accent)}
.vol-cell{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-align:center}
.del-set{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:0}
.suggestion{font-size:10px;color:var(--accent);font-family:'DM Mono',monospace;padding:6px 16px 10px}
.pr-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
.pr-item{background:var(--surface2);border-radius:10px;padding:12px}
.pr-exercise{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pr-weight{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1}
.pr-unit{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted)}
.chart-container{padding:16px}
.chart-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;width:100%;outline:none;margin-bottom:16px;-webkit-appearance:none}
canvas{width:100%!important;border-radius:8px}
.history-session{padding:14px 16px;border-bottom:1px solid var(--border)}
.history-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.history-day{font-family:'Bebas Neue',sans-serif;font-size:22px;margin:2px 0}
.history-summary{font-size:12px;color:var(--muted)}
.history-ex{font-size:13px;color:var(--text);padding:3px 0}
.history-sets{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:60px 30px;color:var(--muted)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-family:'DM Mono',monospace;font-size:12px;letter-spacing:.05em;line-height:1.8}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.modal-actions .btn{flex:1}
.chip{display:inline-block;padding:4px 10px;border-radius:20px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.05em;border:1px solid var(--border);color:var(--muted);cursor:pointer;transition:all .15s}
.chip.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent)}
.chips-row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.workout-header{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.back-btn{background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:36px;height:36px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text)}
.workout-title{font-family:'Bebas Neue',sans-serif;font-size:28px}
.pr-badge{background:var(--accent);color:#0a0a0a;font-size:9px;font-family:'DM Mono',monospace;padding:2px 6px;border-radius:4px;font-weight:500}
.scroll-page{animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.toast{position:fixed;bottom:calc(70px + var(--safe-bottom) + 12px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--accent);color:#0a0a0a;padding:10px 20px;border-radius:20px;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:.05em;z-index:300;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div id="app">
  <div id="content">
    <!-- HOME -->
    <div id="page-home" class="page active scroll-page">
      <div class="page-header">
        <div class="page-title">LIFT</div>
        <div class="page-subtitle" id="home-date"></div>
      </div>
      <div id="day-grid" class="day-grid"></div>
      <div style="padding:0 16px 16px">
        <button class="btn btn-secondary" style="width:100%" onclick="openAddDayModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Training Day
        </button>
      </div>
    </div>

    <!-- WORKOUT -->
    <div id="page-workout" class="page scroll-page">
      <div class="workout-header">
        <div class="back-btn" onclick="showPage('home')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><polyline points="15 18 9 12 15 6"/></svg>
        </div>
        <div id="workout-title" class="workout-title"></div>
      </div>
      <div id="workout-exercises"></div>
      <div style="padding:16px;display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-secondary" style="width:100%" onclick="openAddExerciseModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Exercise
        </button>
        <button class="btn btn-primary" style="width:100%" onclick="saveWorkout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><polyline points="20 6 9 17 4 12"/></svg>
          Save Workout
        </button>
      </div>
    </div>

    <!-- PROGRESS -->
    <div id="page-progress" class="page scroll-page">
      <div class="page-header">
        <div class="page-title">PROGRESS</div>
        <div class="page-subtitle">Personal Records &amp; Trends</div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">🏆 Personal Records</span></div>
        <div id="pr-grid" class="pr-grid"></div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">📈 Strength Curve</span></div>
        <div class="chart-container">
          <select class="chart-select" id="chart-exercise-select" onchange="renderChart()"></select>
          <canvas id="strength-chart" height="200"></canvas>
        </div>
      </div>
    </div>

    <!-- HISTORY -->
    <div id="page-history" class="page scroll-page">
      <div class="page-header">
        <div class="page-title">HISTORY</div>
        <div class="page-subtitle">Past Sessions</div>
      </div>
      <div id="history-list"></div>
    </div>
  </div>

  <nav>
    <button class="nav-btn active" data-page="home" onclick="showPage('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      Home
    </button>
    <button class="nav-btn" data-page="progress" onclick="showPage('progress')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </button>
    <button class="nav-btn" data-page="history" onclick="showPage('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      History
    </button>
  </nav>
</div>

<!-- ADD DAY MODAL -->
<div id="add-day-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">NEW TRAINING DAY</div>
    <div class="input-group">
      <label class="input-label">Day Name</label>
      <input class="input" id="day-name-input" placeholder="e.g. Chest &amp; Triceps" />
    </div>
    <div class="input-group">
      <label class="input-label">Category</label>
      <div class="chips-row" id="day-category-chips">
        <div class="chip" onclick="toggleChip(this)">Chest</div>
        <div class="chip" onclick="toggleChip(this)">Back</div>
        <div class="chip" onclick="toggleChip(this)">Legs</div>
        <div class="chip" onclick="toggleChip(this)">Shoulders</div>
        <div class="chip" onclick="toggleChip(this)">Arms</div>
        <div class="chip" onclick="toggleChip(this)">Core</div>
        <div class="chip" onclick="toggleChip(this)">Push</div>
        <div class="chip" onclick="toggleChip(this)">Pull</div>
        <div class="chip" onclick="toggleChip(this)">Full Body</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('add-day-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addDay()">Create</button>
    </div>
  </div>
</div>

<!-- ADD EXERCISE MODAL -->
<div id="add-exercise-modal" class="modal-overlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">ADD EXERCISE</div>
    <div class="input-group">
      <label class="input-label">Exercise Name</label>
      <input class="input" id="exercise-name-input" placeholder="e.g. Bench Press" />
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('add-exercise-modal')">Cancel</button>
      <button class="btn btn-primary" onclick="addExercise()">Add</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var data = JSON.parse(localStorage.getItem('lift_data') || '{"days":[],"sessions":[]}');
var currentDayId = null;
var currentWorkout = {};

function save(){ localStorage.setItem('lift_data', JSON.stringify(data)); }

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ---- NAV ----
function showPage(p){
  document.querySelectorAll('.page').forEach(function(el){ el.classList.remove('active'); });
  document.querySelectorAll('.nav-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('page-'+p).classList.add('active');
  var nb = document.querySelector('.nav-btn[data-page="'+p+'"]');
  if(nb) nb.classList.add('active');
  if(p==='home') renderHome();
  if(p==='progress') renderProgress();
  if(p==='history') renderHistory();
}

// ---- HOME ----
function renderHome(){
  var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  var now = new Date();
  document.getElementById('home-date').textContent = days[now.getDay()] + ' · ' + now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  var grid = document.getElementById('day-grid');
  if(!data.days.length){
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1"><div class="empty-icon">🏋️</div><div class="empty-text">No training days yet.<br>Add your first day below.</div></div>';
    return;
  }
  grid.innerHTML = data.days.map(function(day){
    var sessions = data.sessions.filter(function(s){ return s.dayId===day.id; });
    var hasData = sessions.length > 0;
    return '<div class="day-card'+(hasData?' has-data':'')+'" onclick="openWorkout('+day.id+')">'
      +'<div class="day-card-label">'+esc(day.name)+'</div>'
      +'<div class="day-card-sub">'+esc(day.category||'')+'</div>'
      +(hasData?'<div class="day-card-count">'+sessions.length+' sessions</div>':'')
      +'</div>';
  }).join('');
}

// ---- WORKOUT ----
function openWorkout(dayId){
  currentDayId = dayId;
  currentWorkout = {};
  var day = data.days.find(function(d){ return d.id===dayId; });
  document.getElementById('workout-title').textContent = (day.name).toUpperCase();
  // Pre-fill from last session
  var lastSession = null;
  for(var i=data.sessions.length-1;i>=0;i--){
    if(data.sessions[i].dayId===dayId){ lastSession=data.sessions[i]; break; }
  }
  if(lastSession){
    lastSession.exercises.forEach(function(ex){ currentWorkout[ex.name]=[]; });
  }
  renderWorkoutExercises();
  document.querySelectorAll('.page').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('page-workout').classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(function(el){ el.classList.remove('active'); });
  document.getElementById('content').scrollTop=0;
}

function renderWorkoutExercises(){
  var container = document.getElementById('workout-exercises');
  var names = Object.keys(currentWorkout);
  if(!names.length){
    container.innerHTML='<div class="empty"><div class="empty-icon">💪</div><div class="empty-text">No exercises yet.<br>Add one below.</div></div>';
    return;
  }
  container.innerHTML = names.map(function(name){
    var sug = getSuggestion(name);
    var safeId = 'sets_'+name.replace(/[^a-zA-Z0-9]/g,'_');
    return '<div class="card">'
      +'<div class="card-header">'
      +'<span style="font-weight:500;font-size:15px">'+esc(name)+'</span>'
      +'<div style="display:flex;gap:8px;align-items:center">'
      +'<button class="btn btn-sm btn-icon" onclick="addSet(\''+name.replace(/'/g,"\\'")+'\')" style="width:32px;height:32px;font-size:18px">+</button>'
      +'</div></div>'
      +(sug?'<div class="suggestion">💡 '+esc(sug)+'</div>':'')
      +'<div class="set-header"><span>SET</span><span style="text-align:center">KG</span><span style="text-align:center">REPS</span><span style="text-align:center">VOL</span><span></span></div>'
      +'<div id="'+safeId+'"></div>'
      +'</div>';
  }).join('');
  names.forEach(function(name){ renderSets(name); });
}

function renderSets(name){
  var safeId = 'sets_'+name.replace(/[^a-zA-Z0-9]/g,'_');
  var container = document.getElementById(safeId);
  if(!container) return;
  var sets = currentWorkout[name]||[];
  if(!sets.length){
    container.innerHTML='<div style="padding:12px 16px;color:var(--muted);font-size:12px;font-family:DM Mono,monospace">Tap + to add a set</div>';
    return;
  }
  container.innerHTML = sets.map(function(s,i){
    var vol = (s.weight&&s.reps)?(parseFloat(s.weight)*parseInt(s.reps)).toFixed(0):'-';
    var safeName = name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    return '<div class="set-row">'
      +'<div class="set-num">'+(i+1)+'</div>'
      +'<input class="set-input" type="number" inputmode="decimal" placeholder="0" value="'+esc(s.weight||'')+'" onchange="updateSet(\''+safeName+'\','+i+',\'weight\',this.value)">'
      +'<input class="set-input" type="number" inputmode="numeric" placeholder="0" value="'+esc(s.reps||'')+'" onchange="updateSet(\''+safeName+'\','+i+',\'reps\',this.value)">'
      +'<div class="vol-cell">'+vol+'</div>'
      +'<button class="del-set" onclick="removeSet(\''+safeName+'\','+i+')">×</button>'
      +'</div>';
  }).join('');
}

function addSet(name){
  if(!currentWorkout[name]) currentWorkout[name]=[];
  var prev = currentWorkout[name].slice(-1)[0];
  var weight='',reps='';
  // suggest from last session
  var lastSession=null;
  for(var i=data.sessions.length-1;i>=0;i--){
    if(data.sessions[i].dayId===currentDayId){lastSession=data.sessions[i];break;}
  }
  if(lastSession){
    var lastEx=lastSession.exercises.find(function(e){return e.name===name;});
    if(lastEx&&lastEx.sets){
      var idx=currentWorkout[name].length;
      if(lastEx.sets[idx]){weight=lastEx.sets[idx].weight||'';reps=lastEx.sets[idx].reps||'';}
    }
  }
  if(prev){weight=weight||prev.weight;reps=reps||prev.reps;}
  currentWorkout[name].push({weight:weight,reps:reps});
  renderSets(name);
}

function updateSet(name,idx,field,val){
  if(!currentWorkout[name]) return;
  currentWorkout[name][idx][field]=val;
  renderSets(name);
}

function removeSet(name,idx){
  currentWorkout[name].splice(idx,1);
  renderSets(name);
}

function getSuggestion(name){
  var lastSession=null;
  for(var i=data.sessions.length-1;i>=0;i--){
    if(data.sessions[i].dayId===currentDayId&&data.sessions[i].exercises.some(function(e){return e.name===name;})){
      lastSession=data.sessions[i];break;
    }
  }
  if(!lastSession) return null;
  var ex=lastSession.exercises.find(function(e){return e.name===name;});
  if(!ex||!ex.sets||!ex.sets.length) return null;
  var maxSet=ex.sets.reduce(function(a,b){return parseFloat(b.weight||0)>parseFloat(a.weight||0)?b:a;},ex.sets[0]);
  var sug=(parseFloat(maxSet.weight||0)+2.5).toFixed(1);
  return 'Last: '+maxSet.weight+'kg × '+maxSet.reps+' reps  →  Try '+sug+'kg';
}

function openAddExerciseModal(){
  document.getElementById('add-exercise-modal').classList.add('open');
  document.getElementById('exercise-name-input').value='';
  setTimeout(function(){document.getElementById('exercise-name-input').focus();},350);
}

function addExercise(){
  var name=document.getElementById('exercise-name-input').value.trim();
  if(!name) return;
  if(!currentWorkout[name]) currentWorkout[name]=[];
  closeModal('add-exercise-modal');
  renderWorkoutExercises();
}

function saveWorkout(){
  var exercises=Object.entries(currentWorkout).map(function(e){return {name:e[0],sets:e[1]};}).filter(function(ex){return ex.sets.some(function(s){return s.weight||s.reps;});});
  if(!exercises.length){showToast('Add at least one set!');return;}
  data.sessions.push({id:Date.now(),dayId:currentDayId,date:new Date().toISOString(),exercises:exercises});
  save();
  showToast('Workout saved! 💪');
  setTimeout(function(){showPage('home');},800);
}

// ---- PROGRESS ----
function renderProgress(){
  var prMap={};
  data.sessions.forEach(function(s){
    s.exercises.forEach(function(ex){
      if(ex.sets) ex.sets.forEach(function(set){
        var w=parseFloat(set.weight)||0;
        if(!prMap[ex.name]||w>prMap[ex.name]) prMap[ex.name]=w;
      });
    });
  });
  var prGrid=document.getElementById('pr-grid');
  var prs=Object.entries(prMap).filter(function(e){return e[1]>0;}).sort(function(a,b){return b[1]-a[1];});
  if(!prs.length){
    prGrid.innerHTML='<div style="padding:20px;color:var(--muted);font-family:DM Mono,monospace;font-size:12px;text-align:center;grid-column:1/-1">Log workouts to see your PRs</div>';
  } else {
    prGrid.innerHTML=prs.slice(0,10).map(function(e){
      return '<div class="pr-item"><div class="pr-exercise">'+esc(e[0])+'</div><div class="pr-weight">'+e[1]+'</div><div class="pr-unit">kg max</div></div>';
    }).join('');
  }
  var allExercises=[...new Set(data.sessions.flatMap(function(s){return s.exercises.map(function(e){return e.name;});}))];
  var sel=document.getElementById('chart-exercise-select');
  sel.innerHTML=allExercises.length?allExercises.map(function(e){return '<option value="'+esc(e)+'">'+esc(e)+'</option>';}).join(''):'<option>No data yet</option>';
  renderChart();
}

function renderChart(){
  var canvas=document.getElementById('strength-chart');
  var ctx=canvas.getContext('2d');
  var exName=document.getElementById('chart-exercise-select').value;
  var points=[];
  data.sessions.forEach(function(s){
    var ex=s.exercises.find(function(e){return e.name===exName;});
    if(ex&&ex.sets){
      var maxW=Math.max.apply(null,ex.sets.map(function(st){return parseFloat(st.weight)||0;}));
      if(maxW>0) points.push({date:new Date(s.date),weight:maxW});
    }
  });
  points.sort(function(a,b){return a.date-b.date;});
  var W=canvas.offsetWidth||320,H=200;
  canvas.width=W*window.devicePixelRatio;canvas.height=H*window.devicePixelRatio;
  ctx.scale(window.devicePixelRatio,window.devicePixelRatio);
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#1e1e1e';ctx.beginPath();ctx.roundRect(0,0,W,H,8);ctx.fill();
  if(points.length<2){
    ctx.fillStyle='#666';ctx.font='12px DM Mono,monospace';ctx.textAlign='center';
    ctx.fillText('Log 2+ sessions to see chart',W/2,H/2);return;
  }
  var pad={t:24,r:20,b:30,l:46};
  var pw=W-pad.l-pad.r,ph=H-pad.t-pad.b;
  var minW=Math.min.apply(null,points.map(function(p){return p.weight;}));
  var maxW=Math.max.apply(null,points.map(function(p){return p.weight;}));
  var range=maxW-minW||10;
  function toX(i){return pad.l+(i/(points.length-1))*pw;}
  function toY(w){return pad.t+ph-((w-minW)/range)*ph;}
  ctx.strokeStyle='#2a2a2a';ctx.lineWidth=1;
  for(var g=0;g<=4;g++){
    var gy=pad.t+(ph/4)*g;
    ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+pw,gy);ctx.stroke();
    ctx.fillStyle='#666';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';
    ctx.fillText((maxW-(range/4)*g).toFixed(1),pad.l-6,gy+3);
  }
  var grad=ctx.createLinearGradient(0,pad.t,0,pad.t+ph);
  grad.addColorStop(0,'rgba(232,255,71,.3)');grad.addColorStop(1,'rgba(232,255,71,0)');
  ctx.beginPath();ctx.moveTo(toX(0),toY(points[0].weight));
  points.forEach(function(p,i){if(i>0)ctx.lineTo(toX(i),toY(p.weight));});
  ctx.lineTo(toX(points.length-1),pad.t+ph);ctx.lineTo(toX(0),pad.t+ph);ctx.closePath();
  ctx.fillStyle=grad;ctx.fill();
  ctx.strokeStyle='#e8ff47';ctx.lineWidth=2;ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(toX(0),toY(points[0].weight));
  points.forEach(function(p,i){if(i>0)ctx.lineTo(toX(i),toY(p.weight));});
  ctx.stroke();
  points.forEach(function(p,i){
    ctx.fillStyle='#e8ff47';ctx.beginPath();ctx.arc(toX(i),toY(p.weight),4,0,Math.PI*2);ctx.fill();
    if(i===0||i===points.length-1){
      ctx.fillStyle='#e8ff47';ctx.font='bold 10px DM Mono,monospace';ctx.textAlign='center';
      ctx.fillText(p.weight+'kg',toX(i),toY(p.weight)-10);
    }
    if(points.length<=6||i%Math.ceil(points.length/5)===0){
      ctx.fillStyle='#666';ctx.font='9px DM Mono,monospace';ctx.textAlign='center';
      ctx.fillText(p.date.toLocaleDateString('en-US',{month:'numeric',day:'numeric'}),toX(i),H-pad.b+14);
    }
  });
}

// ---- HISTORY ----
function renderHistory(){
  var list=document.getElementById('history-list');
  if(!data.sessions.length){list.innerHTML='<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No sessions yet.</div></div>';return;}
  var sorted=[...data.sessions].reverse();
  list.innerHTML=sorted.map(function(s){
    var day=data.days.find(function(d){return d.id===s.dayId;});
    var d=new Date(s.date);
    var dayName=day?day.name:'Unknown';
    var totalSets=s.exercises.reduce(function(acc,ex){return acc+(ex.sets?ex.sets.filter(function(st){return st.weight||st.reps;}).length:0);},0);
    var exList=s.exercises.map(function(ex){
      var sets=(ex.sets||[]).filter(function(st){return st.weight||st.reps;});
      return '<div class="history-ex">'+esc(ex.name)+' <span class="history-sets">'+sets.map(function(st){return esc(st.weight||'?')+'kg×'+esc(st.reps||'?');}).join(', ')+'</span></div>';
    }).join('');
    return '<div class="history-session">'
      +'<div class="history-date">'+d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})+'</div>'
      +'<div class="history-day">'+esc(dayName.toUpperCase())+'</div>'
      +'<div class="history-summary">'+s.exercises.length+' exercises · '+totalSets+' sets</div>'
      +'<div style="margin-top:8px">'+exList+'</div>'
      +'</div>';
  }).join('');
}

// ---- DAYS ----
function openAddDayModal(){
  document.getElementById('add-day-modal').classList.add('open');
  document.getElementById('day-name-input').value='';
  document.querySelectorAll('#day-category-chips .chip').forEach(function(c){c.classList.remove('active');});
  setTimeout(function(){document.getElementById('day-name-input').focus();},350);
}

function addDay(){
  var name=document.getElementById('day-name-input').value.trim();
  if(!name) return;
  var activeChip=document.querySelector('#day-category-chips .chip.active');
  var category=activeChip?activeChip.textContent:'';
  data.days.push({id:Date.now(),name:name,category:category,exercises:[]});
  save();closeModal('add-day-modal');renderHome();
}

// ---- UTILS ----
function closeModal(id){document.getElementById(id).classList.remove('open');}
function toggleChip(el){el.parentElement.querySelectorAll('.chip').forEach(function(c){c.classList.remove('active');});el.classList.toggle('active');}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}

document.querySelectorAll('.modal-overlay').forEach(function(overlay){
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.classList.remove('open');});
});

// Enter key support
document.getElementById('day-name-input').addEventListener('keydown',function(e){if(e.key==='Enter')addDay();});
document.getElementById('exercise-name-input').addEventListener('keydown',function(e){if(e.key==='Enter')addExercise();});

renderHome();
</script>
